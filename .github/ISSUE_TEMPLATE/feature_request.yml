name: 💡 Feature request
description: Suggest an improvement or a new capability for Catalyst.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Your Catalyst version is pre-filled below.
  - type: checkboxes
    id: checks
    attributes:
      label: Before you start
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Which part of Catalyst?
      options:
        - No preference
        - Git Graph
        - Editor
        - Updates / installer
        - Account / subscription
        - Other
      default: 0
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement.
      placeholder: A way to pin favourite repos in Git Graph…
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      placeholder: Right now I have to re-open each repo every time…
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Catalyst version
      description: Pre-filled by the app.
      placeholder: e.g. 1.10
    validations:
      required: false
  - type: input
    id: contact
    attributes:
      label: Contact (optional)
      description: Email or GitHub handle if you'd like a reply. Catalyst has no accounts, so nothing is attached unless you add it here.
      placeholder: you@example.com or @handle
    validations:
      required: false
