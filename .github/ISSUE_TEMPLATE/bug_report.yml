name: 🐞 Bug report
description: Report something in Catalyst that isn't working right.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Catalyst! Your version is pre-filled below.
        Please describe what went wrong so we can reproduce it.
  - type: checkboxes
    id: checks
    attributes:
      label: Before you start
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I'm on the latest version of Catalyst.
          required: false
  - type: dropdown
    id: area
    attributes:
      label: Where did it happen?
      options:
        - Not sure
        - Git Graph
        - Editor
        - Updates / installer
        - Account / subscription
        - Other
      default: 0
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, and what went wrong? Paste any error message exactly.
      placeholder: When I opened Git Graph and imported a repo, the spinner never stopped…
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open …
        2. Click …
        3. See …
    validations:
      required: false
  - type: dropdown
    id: frequency
    attributes:
      label: How often does it happen?
      options:
        - Every time
        - Often
        - Once / rarely
      default: 0
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Catalyst version
      description: Pre-filled by the app (Help & Info → About shows it too).
      placeholder: e.g. 1.10
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. macOS 26 (Tahoe) / 14 (Sonoma)
    validations:
      required: false
  - type: input
    id: contact
    attributes:
      label: Contact (optional)
      description: Email or GitHub handle if you'd like a reply. Catalyst has no accounts, so nothing is attached unless you add it here.
      placeholder: you@example.com or @handle
    validations:
      required: false
